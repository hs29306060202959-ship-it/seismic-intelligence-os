<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_4 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_4" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.set(3, 3, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Seismic Cube Group
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

// Create the Volumetric "Points" Cloud for Seismic Data
const geometry = new THREE.BoxGeometry(2, 2, 2, 20, 20, 20);
const material = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.02,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});

const points = new THREE.Points(geometry, material);
cubeGroup.add(points);

// Bounding Box
const boxGeo = new THREE.BoxGeometry(2.05, 2.05, 2.05);
const boxEdges = new THREE.EdgesGeometry(boxGeo);
const boxMat = new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.5 });
const boxLines = new THREE.LineSegments(boxEdges, boxMat);
cubeGroup.add(boxLines);

// Add Grid/Axes
const gridHelper = new THREE.GridHelper(4, 10, 0x223344, 0x112233);
gridHelper.position.y = -1.1;
scene.add(gridHelper);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00e676, 1, 10);
pointLight.position.set(2, 2, 2);
scene.add(pointLight);

// Animation Loop
const animate = () => {
    requestAnimationFrame(animate);
    
    cubeGroup.rotation.y += 0.002;
    cubeGroup.rotation.x += 0.001;
    
    // Subtle pulse to points
    points.material.opacity = 0.4 + Math.sin(Date.now() * 0.001) * 0.2;
    
    renderer.render(scene, camera);
};

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_4 -->
</body>
</html>
